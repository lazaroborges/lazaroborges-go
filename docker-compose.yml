# Rinha de Backend 2026 — Lazaro's submission.
#
# Topology (per CLAUDE.md):
#   HAProxy (TCP mode, :9999) → round-robin → api-1, api-2 over UDS
#
# Resource budget (1 CPU + 350MB cap):
#   haproxy: 0.10 CPU, 25 MB
#   api-1:   0.45 CPU, 160 MB   (index ~85 MB + Go runtime + pools)
#   api-2:   0.45 CPU, 160 MB
#                       --------
#   total:    1.00 CPU, 345 MB
#
# `sockets/` is a shared tmpfs-backed volume so HAProxy can reach the UDS
# files the API instances create.

services:
  api-1: &api
    build:
      context: ..
      dockerfile: rinha-2026/Dockerfile
      target: runtime
    image: lazaroborges/rinha-2026-api:latest
    command:
      - "-socket=/var/run/sockets/api-1.sock"
      - "-index=/index.bin"
      - "-nprobe=12"
      - "-retry-nprobe=24"
      - "-debug=:6060"
    environment:
      # asyncpreemptoff was a Mac-native win (no CFS quota) but a disaster
      # on the 0.45-CPU contest box: a goroutine stuck in the IVF loop
      # monopolised the M, so HTTP accept starved for tens of ms whenever
      # CFS throttled. Default async preempt + GOMAXPROCS=1 keeps the
      # network poller responsive.
      GOGC: "off"
    ports:
      - "16060:6060"
    volumes:
      - sockets:/var/run/sockets
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "160MB"
    networks: [rinha]

  api-2:
    <<: *api
    command:
      - "-socket=/var/run/sockets/api-2.sock"
      - "-index=/index.bin"
      - "-nprobe=12"
      - "-retry-nprobe=24"
    environment:
      GOGC: "off"
    # api-2 does not expose debug port (only api-1 is instrumented).
    ports: []

  haproxy:
    build:
      context: ..
      dockerfile: rinha-2026/Dockerfile.haproxy
    image: lazaroborges/rinha-2026-haproxy:latest
    depends_on:
      - api-1
      - api-2
    ports:
      - "9999:9999"
    volumes:
      - sockets:/var/run/sockets
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "25MB"
    networks: [rinha]

networks:
  rinha:
    driver: bridge

volumes:
  sockets:
    # tmpfs keeps the UDS sockets in RAM (no disk I/O on connect).
    driver_opts:
      type: tmpfs
      device: tmpfs
