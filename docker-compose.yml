services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "30MB"

  api1:
    image: lazaroborges/lazaroborges-go:latest
    environment:
      ADDR: ":8080"
      NPROBE: "32"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/ready"]
      interval: 2s
      timeout: 5s
      retries: 30
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "160MB"

  api2:
    image: lazaroborges/lazaroborges-go:latest
    environment:
      ADDR: ":8080"
      NPROBE: "32"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/ready"]
      interval: 2s
      timeout: 5s
      retries: 30
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "160MB"
