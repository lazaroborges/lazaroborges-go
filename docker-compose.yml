services:
  nginx:
    image: nginx:1.27-alpine
    platform: linux/amd64
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.15"
          memory: "50MB"

  api1:
    build:
      context: .
      platforms:
        - linux/amd64
    image: lazaroborges/lazaroborges-go:latest
    platform: linux/amd64
    environment:
      ADDR: ":8080"
      NPROBE: "64"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/ready"]
      interval: 2s
      timeout: 5s
      retries: 30
    deploy:
      resources:
        limits:
          cpus: "0.425"
          memory: "150MB"

  api2:
    build:
      context: .
      platforms:
        - linux/amd64
    image: lazaroborges/lazaroborges-go:latest
    platform: linux/amd64
    environment:
      ADDR: ":8080"
      NPROBE: "64"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/ready"]
      interval: 2s
      timeout: 5s
      retries: 30
    deploy:
      resources:
        limits:
          cpus: "0.425"
          memory: "150MB"
