# Direct-to-API benchmark variant (no HAProxy). Used to isolate whether
# HAProxy is contributing to the handler→k6 latency gap. Single instance
# bound to host :9999 over TCP. Gets full 1 CPU since HAProxy is gone.
services:
  api:
    build:
      context: ..
      dockerfile: rinha-2026/Dockerfile
      platforms: ["linux/amd64"]
      target: runtime
    image: lazaroborges/rinha-2026-api:latest
    command:
      - "-listen=:9999"
      - "-index=/index.bin"
      - "-nprobe=12"
      - "-retry-nprobe=96"
      - "-debug=:6060"
    environment:
      GODEBUG: "asyncpreemptoff=1"
      GOGC: "off"
    ports:
      - "9999:9999"
      - "16060:6060"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "320MB"
