global
    maxconn 8192
    # nbthread=1 with HAProxy at 0.20 CPU: single thread gets the full
    # 20ms/100ms quota uncontended. TCP-mode splice is I/O bound; one
    # thread with more CPU > two threads splitting the same budget.
    # Tested: nbthread=2 added no measurable benefit and introduced
    # CFS contention between threads.
    nbthread 1
    daemon
    log stdout format raw daemon info
    # Tighten buffer sizes — our request/response bodies are small (~500B in,
    # ~40B out). Default 16KB tunings just waste cache.
    tune.bufsize 4096
    tune.maxrewrite 1024
    # Process events immediately instead of batching — favors tail latency
    # over throughput. Default batching adds tens of µs per request.
    tune.sched.low-latency on

defaults
    mode tcp
    timeout client 30s
    timeout server 30s
    timeout connect 5s
    option tcp-smart-accept
    option tcp-smart-connect
    # Suppress per-connection log lines — TCP-mode logs are noisy and
    # contribute to syscall load under high VU counts.
    option dontlognull
    no log

frontend fraud_in
    bind :9999
    default_backend fraud_api

backend fraud_api
    balance roundrobin
    # Unix Domain Sockets to the API instances. Skips the kernel TCP stack
    # entirely between LB and apps. HAProxy in `mode tcp` just splices bytes.
    server api1 /var/run/sockets/api-1.sock check inter 5s
    server api2 /var/run/sockets/api-2.sock check inter 5s
